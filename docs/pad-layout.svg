<svg xmlns="http://www.w3.org/2000/svg" viewBox="-180 0 1280 420"><style>.body{fill:#2a241b;stroke:#5a4d38;stroke-width:2}.part{fill:#3a3226;stroke:#5a4d38}.stick{fill:#241f17;stroke:#6a5a40}.lead{fill:none;stroke:#6a5a40;stroke-width:1}.lname{font:600 11px sans-serif;fill:#f3e9d2}.lname tspan{font-weight:400;font-size:10.5px}.bound{fill:#c9b895}.unbound{fill:#6f6350;font-style:italic}.bl{font:700 10px sans-serif;fill:#1b1712}.cap{font:700 13px sans-serif;fill:#e8a33d}.shiftv{display:none}</style><rect x="-180" width="1280" height="420" fill="#1b1712"/><text x="450" y="20" text-anchor="middle" class="cap">BASE LAYER</text><path d="M300,110 h300 a55,55 0 0 1 55,55 l18,110 a45,45 0 0 1 -80,32 l-30,-52 h-226 l-30,52 a45,45 0 0 1 -80,-32 l18,-110 a55,55 0 0 1 55,-55 z" class="body"/><rect x="295" y="86" width="80" height="12" rx="6" class="part"/><rect x="525" y="86" width="80" height="12" rx="6" class="part"/><rect x="305" y="56" width="55" height="12" rx="6" class="part"/><rect x="540" y="56" width="55" height="12" rx="6" class="part"/><circle cx="330" cy="192" r="26" class="part"/><circle cx="330" cy="192" r="14" class="stick"/><circle cx="505" cy="260" r="26" class="part"/><circle cx="505" cy="260" r="14" class="stick"/><path d="M387,238 h16 v14 h14 v16 h-14 v14 h-16 v-14 h-14 v-16 h14 z" class="part"/><circle cx="565" cy="152" r="12" fill="#e6c229"/><text x="565" y="156" text-anchor="middle" class="bl">Y</text><circle cx="537" cy="180" r="12" fill="#42a5f5"/><text x="537" y="184" text-anchor="middle" class="bl">X</text><circle cx="593" cy="180" r="12" fill="#ef5350"/><text x="593" y="184" text-anchor="middle" class="bl">B</text><circle cx="565" cy="208" r="12" fill="#66bb6a"/><text x="565" y="212" text-anchor="middle" class="bl">A</text><rect x="415" y="148" width="22" height="10" rx="5" class="part"/><rect x="465" y="148" width="22" height="10" rx="5" class="part"/><circle cx="450" cy="190" r="9" class="part"/><polyline points="215,46 245,46 320,62" class="lead"/><text x="210" y="40" text-anchor="end" class="lname">Left Shoulder 2 (LT)<tspan x="210" y="53" class="basev bound">hardpoint 2 (hold)</tspan><tspan x="210" y="53" class="shiftv bound">hardpoint 5 + hardpoint 2 (backup - few cars have a 5th)</tspan></text><polyline points="215,80 245,80 330,92" class="lead"/><text x="210" y="74" text-anchor="end" class="lname">Left Shoulder 1 (LB)<tspan x="210" y="87" class="basev bound">front target (Q)</tspan><tspan x="210" y="87" class="shiftv bound">SHIFT (held)</tspan></text><polyline points="215,114 245,114 322,178" class="lead"/><text x="210" y="108" text-anchor="end" class="lname">Left Stick X<tspan x="210" y="121" class="basev bound">steer</tspan><tspan x="210" y="121" class="shiftv unbound">— unbound —</tspan></text><polyline points="215,148 245,148 322,192" class="lead"/><text x="210" y="142" text-anchor="end" class="lname">Left Stick Y<tspan x="210" y="155" class="basev bound">throttle</tspan><tspan x="210" y="155" class="shiftv unbound">— unbound —</tspan></text><polyline points="215,182 245,182 330,206" class="lead"/><text x="210" y="176" text-anchor="end" class="lname">Left Stick Button (L3)<tspan x="210" y="189" class="basev bound">nitrous / special 1 (hold); with LEFT stick pulled back = toggle reverse</tspan><tspan x="210" y="189" class="shiftv unbound">— unbound —</tspan></text><polyline points="215,216 245,216 395,238" class="lead"/><text x="210" y="210" text-anchor="end" class="lname">D-Pad Up<tspan x="210" y="223" class="basev bound">headlights (H)</tspan><tspan x="210" y="223" class="shiftv bound">binoculars (B)</tspan></text><polyline points="215,250 245,250 395,282" class="lead"/><text x="210" y="244" text-anchor="end" class="lname">D-Pad Down<tspan x="210" y="257" class="basev bound">ignition (I)</tspan><tspan x="210" y="257" class="shiftv bound">horn (G)</tspan></text><polyline points="215,284 245,284 373,260" class="lead"/><text x="210" y="278" text-anchor="end" class="lname">D-Pad Left<tspan x="210" y="291" class="basev bound">notepad (N)</tspan><tspan x="210" y="291" class="shiftv bound">gear down (-)</tspan></text><polyline points="215,318 245,318 417,260" class="lead"/><text x="210" y="312" text-anchor="end" class="lname">D-Pad Right<tspan x="210" y="325" class="basev bound">map (M)</tspan><tspan x="210" y="325" class="shiftv bound">gear up (=)</tspan></text><polyline points="685,46 655,46 580,62" class="lead"/><text x="690" y="40" text-anchor="start" class="lname">Right Shoulder 2 (RT)<tspan x="690" y="53" class="basev bound">fire - current weapon / cockpit handgun (hold)</tspan><tspan x="690" y="53" class="shiftv bound">hardpoint 1</tspan></text><polyline points="685,80 655,80 570,92" class="lead"/><text x="690" y="74" text-anchor="start" class="lname">Right Shoulder 1 (RB)<tspan x="690" y="87" class="basev bound">handbrake</tspan><tspan x="690" y="87" class="shiftv unbound">— unbound —</tspan></text><polyline points="685,114 655,114 565,152" class="lead"/><text x="690" y="108" text-anchor="start" class="lname">Action Top Row 2 (Y)<tspan x="690" y="121" class="basev bound">toggle chase cam &lt;-&gt; cockpit (F3/F1)</tspan><tspan x="690" y="121" class="shiftv bound">cycle camera views (F1 F2 F3 F7 F8 F9 F10 F1 - both dash modes)</tspan></text><polyline points="685,148 655,148 537,180" class="lead"/><text x="690" y="142" text-anchor="start" class="lname">Action Top Row 1 (X)<tspan x="690" y="155" class="basev bound">cycle targets (Y)</tspan><tspan x="690" y="155" class="shiftv bound">radar zoom toggle (R)</tspan></text><polyline points="685,182 655,182 593,180" class="lead"/><text x="690" y="176" text-anchor="start" class="lname">Action Bottom Row 2 (B)<tspan x="690" y="189" class="basev bound">cycle weapon (C)</tspan><tspan x="690" y="189" class="shiftv bound">hardpoint 4 - dropper</tspan></text><polyline points="685,216 655,216 565,208" class="lead"/><text x="690" y="210" text-anchor="start" class="lname">Action Bottom Row 1 (A)<tspan x="690" y="223" class="basev bound">OK/select in menus - click+Enter; in-sim a single shot · NITROUS while held</tspan><tspan x="690" y="223" class="shiftv bound">hardpoint 3 - rear gun only</tspan></text><polyline points="685,250 655,250 505,260" class="lead"/><text x="690" y="244" text-anchor="start" class="lname">Right Stick X/Y<tspan x="690" y="257" class="basev bound">look / glance - cockpit, external cam, menus (arrow keys)</tspan><tspan x="690" y="257" class="shiftv unbound">— unbound —</tspan></text><polyline points="685,284 655,284 505,275" class="lead"/><text x="690" y="278" text-anchor="start" class="lname">Right Stick Button (R3)<tspan x="690" y="291" class="basev bound">look at target (E) · drop mines (hardpoint 4)</tspan><tspan x="690" y="291" class="shiftv unbound">— unbound —</tspan></text><polyline points="320,381 425,155" class="lead"/><text x="320" y="395" text-anchor="middle" class="lname">Center 1 (Select)<tspan x="320" y="408" class="basev bound">pause menu / skip cutscene (Esc)</tspan><tspan x="320" y="408" class="shiftv unbound">— unbound —</tspan></text><polyline points="450,381 475,155" class="lead"/><text x="450" y="395" text-anchor="middle" class="lname">Center 2 (Start)<tspan x="450" y="408" class="basev bound">map (M)</tspan><tspan x="450" y="408" class="shiftv unbound">— unbound —</tspan></text><polyline points="580,381 450,190" class="lead"/><text x="580" y="395" text-anchor="middle" class="lname">Center 3 (Guide)<tspan x="580" y="408" class="basev unbound">— unbound —</tspan><tspan x="580" y="408" class="shiftv unbound">— unbound —</tspan></text></svg>