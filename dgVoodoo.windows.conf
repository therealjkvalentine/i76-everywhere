; Interstate '76 / Nitro Pack — dgVoodoo2 config for REAL WINDOWS
; (the Mac/DXVK path uses the separate dgVoodoo.conf). Deployed into the game
; folder by setup-windows.ps1; identical config works for nitro.exe.
;
; This is the field-tested 2026-07-10 configuration: starts FULLSCREEN
; (aspect-correct on any display via stretched_ar), Alt+Enter toggles
; fullscreen <-> windowed live, and dgVoodoo's emulated cursor keeps the
; mouse CORRECT in menus in both modes (the engine hit-tests raw pixels as
; 640x480 coords - dgVoodoo's cursor emulation bridges that; never present
; the 2D shell through a bare stretched window).
; Load-bearing lines are marked; everything else is taste.

Version                              = 0x287

[General]
OutputAPI                            = d3d11_fl10_1
; WINDOWED (borderless, see WindowedAttributes) - deliberately, for two reasons:
;   1. EXCLUSIVE fullscreen traps the engine's modal dialogs behind the
;      fullscreen surface (black screen, no Alt+Tab). See FullscreenAttributes.
;   2. FullscreenAttributes=fake dodges (1) but per dgVoodoo's ReadmeGeneral it
;      "cannot properly handle centered or stretched scaling modes - those revert
;      to unspecified scaling", i.e. it takes away aspect control.
; Windowed keeps BOTH: dialogs work AND ScalingMode is honoured.
FullScreenMode                       = false
; 'stretched' = fill the window. Combined with the 14:9 forced Resolution below
; this reproduces the Mac's slightly-wider-than-4:3 look. NOTE: stretched_ar
; would NOT do it - dgVoodoo preserves the APPLICATION's 4:3 aspect, not the
; forced resolution's, so _ar just pillarboxes 4:3 inside the wider buffer.
ScalingMode                          = stretched
; false, or the window gets snapped back to the app's 4:3.
KeepWindowAspectRatio                = false
CaptureMouse                         = true
CenterAppWindow                      = true

[GeneralExt]
; THE physics fix (belt-and-braces: the GOG 2019 exe's I76PATCH.DLL also caps
; at 20 where present). Never raise above ~25 - sim advances per rendered frame.
; 19.2 matches the Mac reference (DxWnd 52ms delay): a touch under 20 clears the
; Mission 5 canyon jump AND the tighter later-mission ramp/bridge gaps. dgVoodoo
; 2.7.5+ accepts fractional values. See docs/I76-GAMEPLAY-REFERENCE.md.
FPSLimit                             = 19.2
Resampling                           = bilinear
; LOAD-BEARING for playability: 'fake' = a screen-size BORDERLESS WINDOW instead
; of a real exclusive-fullscreen mode switch. The 1997 engine throws MODAL Windows
; dialogs mid-game ("you need brakes in your inventory", the CD-audio prompt, etc.)
; - under EXCLUSIVE fullscreen those dialogs are trapped BEHIND the fullscreen
; surface: the screen goes black, input is dead, and you can't even Alt+Tab away
; (reported live 2026-07-21). With 'fake' the dialog appears on top and is
; clickable and Alt+Tab works - same fullscreen look, no deadlock.
FullscreenAttributes                 = fake
; Borderless window: with the 14:9 Resolution below this is a full-HEIGHT
; borderless 2240x1440 pane on a 1440-tall display - reads as fullscreen, but
; it's a window, so modal dialogs appear on top and Alt+Tab works.
; ('fullscreensize' would stretch to the full panel width = 21:9 distortion.)
WindowedAttributes                   = borderless
; FreeMouse is conf-only (not in the CPL). Default false = dgVoodoo manages
; the cursor mapping for the app; leave it unless debugging mouse issues.
FreeMouse                            = false

[Glide]
; Voodoo 1 class card. MemorySizeOfTMU=2048 with 1 TMU is LOAD-BEARING:
; I76 crashes/corrupts textures if more TMU memory is reported (VOGONS
; t=70951; reconfirmed at wrapper level 2026-07-10). OnboardRAM 4MB is fine.
VideoCard                           = voodoo_graphics
OnboardRAM                          = 4
MemorySizeOfTMU                     = 2048
NumberOfTMUs                        = 1
TMUFiltering                        = bilinear
; 14:9 (2240x1440 = 1.556) - the Mac reference aspect, which uses a 1920x1234
; window for the same 1.556 ratio ("halfway between 4:3 and 16:9", see
; i76-voodoo-stub.swift). The game submits 640x480 and ScalingMode=stretched
; fills this buffer, so the picture is the wider Mac look, not 4:3.
; 1440 = an exact 3x of the game's 480, and full height on a 1440p display.
; Want pure 4:3 back? set this to 3x AND ScalingMode=stretched_ar.
Resolution                          = h:2240, v:1440
Antialiasing                        = 8x
; The bright 3dfx look.
EnableGlideGammaRamp                = true
ForceEmulatingTruePCIAccess         = true
; false so Lossless Scaling frame-gen owns presentation when used (LSFG x2 on
; the 20fps sim = 40 out, verified); set true if not using LS and you see tearing.
ForceVerticalSync                   = false
3DfxWatermark                       = false
3DfxSplashScreen                    = false
; Keep the sim running when the window loses focus.
EnableInactiveAppState              = true

[DirectX]
; The 2D shell (menus, cutscenes, PLEASE STAND BY) is DirectDraw - dgVoodoo's
; DDraw.dll + D3DImm.dll must sit in the game dir. Resolution stays unforced;
; fullscreen scaling + cursor emulation handle presentation and the mouse.
VideoCard                           = internal3D
VRAM                                = 256
Resolution                          = unforced
dgVoodooWatermark                   = false
AppControlledScreenMode             = true
; Alt+Enter fullscreen/windowed toggle: ENABLED.
DisableAltEnterToToggleScreenMode   = false
