# async pipeline compilation: compile on background threads instead of stalling
# the render thread on every first-seen pipeline (the 0.4fps warmup crawl).
dxvk.enableAsync = true

# Enforce MSAA off at the DXVK layer too (fewer pipeline variants -> less per-launch
# Metal compile). Composes with dgVoodoo Antialiasing=off.
d3d11.disableMsaa = True
